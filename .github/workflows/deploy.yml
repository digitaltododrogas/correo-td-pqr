name: Deploy PQR al VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy en VPS
        run: |
          curl -X POST https://td-pruebas.online/hooks/deploy-pqr \
            -H "X-Deploy-Token: TD20*deploy2026"
          echo "✅ Deploy disparado"
