name: Deploy PQR al VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Generar config.js con secrets
        run: |
          mkdir -p public/assets/js
          cat > public/assets/js/config.js << CONFIGEOF
          window.SUPABASE_URL    = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_KEY    = '${{ secrets.SUPABASE_KEY }}';
          window.TENANT_ID       = '${{ secrets.AZURE_TENANT_ID }}';
          window.CLIENT_ID       = '${{ secrets.AZURE_CLIENT_ID }}';
          window.CLIENT_SECRET   = '${{ secrets.AZURE_CLIENT_SECRET }}';
          window.GRAPH_USER_ID   = '${{ secrets.GRAPH_USER_ID }}';
          window.N8N_WEBHOOK_BASE = '${{ secrets.N8N_WEBHOOK_BASE }}';
          CONFIGEOF

      - name: Verificar secrets presentes
        run: |
          if grep -qP ":\s*''" public/assets/js/config.js; then
            echo "❌ ERROR: Hay secrets vacíos"
            exit 1
          else
            echo "✅ config.js OK"
          fi

      - name: Preparar directorio en VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     187.124.71.241
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pqr/assets/{css,js,img}
            echo "✅ Directorios listos"

      - name: Copiar archivos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     187.124.71.241
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "public/"
          target:   /var/www/pqr/
          strip_components: 1

      - name: Recargar Nginx
        uses: appleboy/ssh-action@v1
        with:
          host:     187.124.71.241
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx
            echo "✅ Deploy completo"
            ls -la /var/www/pqr/
