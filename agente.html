<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PQR Agente · Tododrogas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root {
  --ink:      #0a0e1a;
  --ink2:     #3a4258;
  --ink3:     #8892a4;
  --bg:       #f2f4f8;
  --bg2:      #e8ebf2;
  --surface:  #ffffff;
  --surface2: #f7f8fb;
  --border:   #dde1eb;
  --blue:     #2563eb;
  --blue-d:   #1d4ed8;
  --blue-l:   #eff4ff;
  --blue-m:   #bfdbfe;
  --green:    #16a34a;
  --green-l:  #dcfce7;
  --yellow:   #ca8a04;
  --yellow-l: #fef9c3;
  --red:      #dc2626;
  --red-l:    #fee2e2;
  --orange:   #ea580c;
  --orange-l: #fff7ed;
  --shadow:   0 1px 3px rgba(10,14,26,.08),0 4px 12px rgba(10,14,26,.04);
  --shadow-l: 0 2px 8px rgba(10,14,26,.12),0 8px 24px rgba(10,14,26,.08);
  --r:        12px;
  --r2:       8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0e1a 0%,#1e2d4a 50%,#0f1d36 100%);padding:24px}
.login-card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;width:400px;max-width:100%;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logomark{width:56px;height:56px;border-radius:16px;background:var(--blue);display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;margin-bottom:12px;box-shadow:0 8px 24px rgba(37,99,235,.4)}
.login-brand{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.login-brand span{color:var(--blue-m)}
.login-caption{font-size:12px;color:#64748b;margin-top:4px}
.login-field{margin-bottom:20px}
.login-label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;letter-spacing:.3px}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:var(--r2);padding:12px 16px;font-size:14px;font-family:'DM Sans',sans-serif;color:#fff;outline:none;transition:all .2s}
.login-input::placeholder{color:#475569}
.login-input:focus{border-color:var(--blue);background:rgba(37,99,235,.1);box-shadow:0 0 0 4px rgba(37,99,235,.15)}
.pin-input{text-align:center;letter-spacing:16px;font-size:26px;font-family:'DM Mono',monospace;padding:14px}
.login-btn{width:100%;padding:14px;background:var(--blue);border:none;border-radius:var(--r2);color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px}
.login-btn:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,.4)}
.login-btn:active{transform:none}
.login-error{font-size:12px;color:#f87171;text-align:center;margin-top:12px;min-height:18px;font-weight:600}

/* ── APP (oculto hasta login) ── */
#app{display:none;flex-direction:column;min-height:100vh}

/* ── TOPBAR ── */
.topbar{background:var(--ink);color:#fff;height:56px;display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.topbar-logo{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.topbar-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue)}
.topbar-agent{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:5px 12px;font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:6px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-logout{background:none;border:1.5px solid #334155;color:#64748b;padding:5px 12px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn-logout:hover{border-color:#ef4444;color:#ef4444}
.btn-refresh{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:5px 12px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-refresh:hover{background:#334155;color:#fff}
.btn-refresh.spin svg{animation:spin 1s linear infinite}
.last-sync{font-size:10px;color:#475569;font-family:'DM Mono',monospace}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:calc(100vh - 56px);position:sticky;top:56px}
.main{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.sidebar-top{padding:14px;border-bottom:1px solid var(--border)}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:8px 12px 8px 32px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--blue);background:#fff}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3)}
.tabs-mini{display:flex;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border)}
.tab-mini{flex:1;text-align:center;padding:6px 4px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;color:var(--ink3);transition:all .15s;position:relative}
.tab-mini:hover{background:var(--bg)}
.tab-mini.active{background:var(--blue-l);color:var(--blue)}
.tab-mini .cnt{position:absolute;top:-4px;right:-2px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;font-family:'DM Mono',monospace}
.tab-mini.active .cnt{background:var(--blue-d)}
.email-list{flex:1;overflow-y:auto}
.email-list::-webkit-scrollbar{width:3px}
.email-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.email-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.email-item:hover{background:var(--bg)}
.email-item.selected{background:var(--blue-l);border-left:3px solid var(--blue)}
.email-item.unread{background:#fafcff}
.unread-pip{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--blue)}
.e-from{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-subj{font-size:11px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.e-prev{font-size:10px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-foot{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.e-time{font-size:10px;font-family:'DM Mono',monospace;color:var(--ink3)}
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px}
.badge.pendiente{background:var(--yellow-l);color:var(--yellow)}
.badge.gestion{background:var(--blue-l);color:var(--blue)}
.badge.gestionado{background:var(--orange-l);color:var(--orange)}
.badge.solucionado{background:var(--green-l);color:var(--green)}
.empty-state{padding:40px 20px;text-align:center;color:var(--ink3)}
.empty-state .ei{font-size:32px;margin-bottom:10px}

/* ── MAIN ── */
.welcome-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.welcome-av{width:44px;height:44px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0}
.welcome-name{font-size:16px;font-weight:700;color:var(--ink)}
.welcome-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.mini-stats{display:flex;gap:16px;margin-left:auto}
.mini-stat{text-align:center}
.mini-stat-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ink)}
.mini-stat-lbl{font-size:10px;color:var(--ink3);font-weight:600}

/* ── DETAIL ── */
.detail-placeholder{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:80px 40px;text-align:center;color:var(--ink3)}
.detail-placeholder .di{font-size:48px;margin-bottom:16px}
.detail-placeholder p{font-size:14px}

.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.detail-header{padding:20px;border-bottom:1px solid var(--border)}
.detail-subject{font-size:18px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:12px}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.meta-chip{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--ink2)}
.detail-actions{display:flex;flex-wrap:wrap;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-d)}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-success{background:var(--green-l);color:var(--green)}
.btn-success:hover{background:#bbf7d0}
.btn-warning{background:var(--yellow-l);color:var(--yellow)}
.btn-warning:hover{background:#fef08a}
.detail-body-wrap{padding:20px;border-bottom:1px solid var(--border)}
.email-content{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:20px;font-size:14px;line-height:1.75;color:var(--ink)}
.email-content.html-mode{padding:0;overflow:hidden}
.email-content.html-mode iframe{width:100%;min-height:350px;border:none;border-radius:var(--r)}

/* ── ADJUNTOS ── */
.adj-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.adj-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}
.adj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:8px}
.adj-img-card{border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:#fff}
.adj-img-card:hover{transform:scale(1.03);box-shadow:var(--shadow-l)}
.adj-img-card img{width:100%;height:100px;object-fit:cover;display:block}
.adj-img-label{padding:4px 8px;font-size:10px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adj-pdf-wrap{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.adj-pdf-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2)}
.adj-pdf-name{font-size:12px;font-weight:600;color:var(--ink2)}
.adj-pdf-frame{width:100%;height:280px;border:none}
.adj-files{display:flex;flex-wrap:wrap;gap:6px}
.adj-pill{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r2);padding:5px 10px;font-size:12px;font-weight:500;color:var(--ink2);text-decoration:none;transition:all .15s;cursor:pointer}
.adj-pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}

/* ── REPLY ── */
.reply-section{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.reply-wrap{background:var(--surface2);border:1.5px solid var(--blue-m);border-radius:var(--r);overflow:hidden}
.reply-header{background:var(--blue-l);border-bottom:1px solid var(--blue-m);padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.reply-to-row{display:flex;align-items:center;gap:8px}
.reply-agent-row{display:flex;align-items:center;gap:8px;padding-top:4px;border-top:1px solid var(--blue-m);margin-top:4px}
.reply-label{font-size:11px;font-weight:700;color:var(--blue);min-width:50px;text-transform:uppercase;letter-spacing:.5px}
.reply-addr{font-size:12px;color:var(--ink2)}
.reply-textarea{width:100%;background:#fff;border:none;border-bottom:1px solid var(--border);padding:14px 16px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--ink);resize:vertical;min-height:120px;outline:none}
.reply-preview-toggle{padding:8px 16px;font-size:11px;color:var(--ink3);cursor:pointer;display:flex;align-items:center;gap:4px;border-bottom:1px solid var(--border);transition:color .15s}
.reply-preview-toggle:hover{color:var(--blue)}
.reply-preview-citado{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.reply-firma-preview{font-size:11px;color:var(--ink3);padding:8px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px;line-height:1.6}
.reply-citado-header{font-size:11px;color:var(--ink3);border-left:3px solid var(--blue);padding-left:10px;margin-bottom:8px;line-height:1.8}
.reply-citado-body{font-size:12px;color:var(--ink3);border-left:3px solid var(--border);padding-left:10px;max-height:200px;overflow-y:auto;line-height:1.6}
.reply-actions{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px}

/* ── HISTORIAL ── */
.hist-section{padding:16px 20px}
.hist-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}
.hist-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);margin-top:5px;flex-shrink:0}
.hist-time{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;min-width:50px;flex-shrink:0}
.hist-info .hist-label{font-size:12px;font-weight:600;color:var(--ink)}
.hist-info .hist-detail{font-size:11px;color:var(--ink3)}

/* ── MODAL ADJUNTO ── */
.adj-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center}
.adj-modal.show{display:flex}
.adj-modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.12);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}
.adj-modal-close:hover{background:rgba(255,255,255,.22)}

/* ── TOASTS ── */
#toasts{position:fixed;bottom:20px;right:20px;z-index:600;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-l);animation:toastIn .25s ease;display:flex;align-items:center;gap:8px}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--ink);color:#fff}
@keyframes toastIn{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.sidebar{width:100%;min-width:0;height:auto;position:static}.layout{flex-direction:column}.main{padding:16px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logomark">TD</div>
        <div class="login-brand">Todo<span>drogas</span></div>
        <div class="login-caption">Sistema PQR — Portal Agente</div>
      </div>
      <div class="login-field">
        <label class="login-label">Nombre completo</label>
        <input class="login-input" type="text" id="loginNombre" placeholder="Nombre Apellido" autocomplete="name" autofocus>
      </div>
      <div class="login-field">
        <label class="login-label">PIN de acceso</label>
        <input class="login-input pin-input" type="password" id="loginPin" maxlength="4" inputmode="numeric" placeholder="·  ·  ·  ·">
        <div style="font-size:11px;color:#475569;text-align:center;margin-top:6px">4 dígitos asignados por el administrador</div>
      </div>
      <button class="login-btn" onclick="doLogin()">Ingresar al sistema</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-dot"></div>
      Tododrogas PQR
    </div>
    <div class="topbar-agent" id="topbarAgent">
      <span>👤</span><span id="topbarAgentName">—</span>
    </div>
    <div class="topbar-right">
      <span class="last-sync" id="lastSync">—</span>
      <button class="btn-refresh" onclick="refreshSinLogout()" id="refreshBtn" title="Actualizar correos">
        <svg id="refreshIcon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/><path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/></svg>
        Actualizar
      </button>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-label">Buscar</div>
        <div class="search-wrap">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Asunto o remitente..." oninput="renderEmails()">
        </div>
      </div>
      <div class="tabs-mini">
        <div class="tab-mini active" id="tab-pendiente" onclick="switchTab('pendiente',this)">
          Pendiente
          <span class="cnt" id="cnt-pendiente">0</span>
        </div>
        <div class="tab-mini" id="tab-gestion" onclick="switchTab('gestion',this)">
          Gestión
          <span class="cnt" id="cnt-gestion">0</span>
        </div>
        <div class="tab-mini" id="tab-solucionado" onclick="switchTab('solucionado',this)">
          Resuelto
          <span class="cnt" id="cnt-solucionado">0</span>
        </div>
      </div>
      <div class="email-list" id="emailsList">
        <div class="empty-state"><div class="ei">📬</div><p>Cargando...</p></div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- Welcome bar -->
      <div class="welcome-bar" id="welcomeBar">
        <div class="welcome-av" id="welcomeAv">?</div>
        <div>
          <div class="welcome-name" id="welcomeName">—</div>
          <div class="welcome-sub">Portal de gestión PQR · td-pruebas.online</div>
        </div>
        <div class="mini-stats">
          <div class="mini-stat">
            <div class="mini-stat-val" id="myPending">0</div>
            <div class="mini-stat-lbl">Pendiente</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-val" id="myActive">0</div>
            <div class="mini-stat-lbl">En gestión</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-val" id="mySolved">0</div>
            <div class="mini-stat-lbl">Resueltos</div>
          </div>
        </div>
      </div>

      <!-- Detail -->
      <div id="detailWrap">
        <div class="detail-placeholder">
          <div class="di">✉️</div>
          <p>Selecciona un correo de la lista para verlo aquí</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL ADJUNTO FULLSCREEN -->
<div class="adj-modal" id="adjModal">
  <button class="adj-modal-close" onclick="closeAdjModal()">✕ Cerrar</button>
  <div id="adjModalContent"></div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const SUPABASE_URL = (window.CONFIG||{}).SUPABASE_URL;
const SUPABASE_KEY = (window.CONFIG||{}).SUPABASE_KEY;
const GRAPH_TENANT    = (window.CONFIG||{}).GRAPH_TENANT;
const GRAPH_CLIENT_ID = (window.CONFIG||{}).GRAPH_CLIENT_ID;
const GRAPH_SECRET    = (window.CONFIG||{}).GRAPH_SECRET;
const GRAPH_USER_ID   = (window.CONFIG||{}).GRAPH_USER_ID;

// ─── MAPEO campos n8n → UI ───────────────────────────────────
function mapCorreo(c) {
  return {
    id:                  c.id,
    message_id:          c.message_id,
    internet_message_id: c.internet_message_id || c.internetMessageId || '',
    conversation_id:     c.conversation_id     || c.conversationId    || '',
    reply_to:            c.reply_to            || c.replyTo           || [],
    asunto:              c.subject      || c.asunto      || '(Sin asunto)',
    remitente:           c.from_email   || c.remitente   || '',
    remitente_nombre:    c.from_name    || c.remitente_nombre || '',
    fecha:               c.received_at  || c.fecha        || c.created_at,
    cuerpo_html:         c.body_content || c.cuerpo_html  || '',
    cuerpo_tipo:         c.body_type    || c.cuerpo_tipo  || 'text',
    tiene_adjuntos:      c.has_attachments ?? c.tiene_adjuntos ?? false,
    leido:               c.is_read      ?? c.leido        ?? false,
    preview:             c.body_preview || c.preview      || '',
    estado:              c.estado       || 'pendiente',
    asignado_a:          c.asignado_a,
    _raw: c,
  };
}

// ─── STATE ───────────────────────────────────────────────────
const state = { emails:[], currentAgent:null, currentTab:'pendiente', selectedId:null };

// ─── SUPABASE ────────────────────────────────────────────────
async function sb(path, method='GET', body=null) {
  const opts = {
    method,
    headers:{
      'Content-Type':'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': method==='POST'?'return=representation': method==='PATCH'?'return=representation':'',
    }
  };
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,opts);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  try{return await r.json();}catch{return null;}
}

// ─── GRAPH TOKEN ─────────────────────────────────────────────
async function getGraphToken() {
  const r=await fetch(`https://login.microsoftonline.com/${GRAPH_TENANT}/oauth2/v2.0/token`,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({grant_type:'client_credentials',client_id:GRAPH_CLIENT_ID,client_secret:GRAPH_SECRET,scope:'https://graph.microsoft.com/.default'})
  });
  return (await r.json()).access_token;
}

// ─── LOGIN ───────────────────────────────────────────────────
async function doLogin() {
  const nombreRaw = document.getElementById('loginNombre').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent='';
  if(!nombreRaw||pin.length!==4){errEl.textContent='Ingresa tu nombre y PIN de 4 dígitos.';return;}
  if(isNaN(pin)){errEl.textContent='El PIN solo debe contener números.';return;}
  try {
    const agents = await sb('agentes?activo=eq.true') || [];
    const found = agents.find(a=>
      (a.nombre||'').toLowerCase().trim()===nombreRaw.toLowerCase() &&
      String(a.pin)===String(pin)
    );
    if(!found){errEl.textContent='Nombre o PIN incorrecto.';document.getElementById('loginPin').value='';return;}
    state.currentAgent = found;
    enterApp();
  } catch(e){errEl.textContent='Error de conexión: '+e.message.substring(0,60);}
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.getElementById('loginWrap').style.display!=='none') doLogin();
});

function enterApp() {
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='flex';
  const a = state.currentAgent;
  const ini = (a.nombre||'?').charAt(0).toUpperCase();
  document.getElementById('topbarAgentName').textContent = a.nombre;
  document.getElementById('welcomeName').textContent = `Hola, ${a.nombre}`;
  document.getElementById('welcomeAv').textContent = ini;
  loadMyEmails();
  setInterval(()=>loadMyEmails(), 90000);
}

function doLogout() {
  state.currentAgent=null;state.emails=[];state.selectedId=null;
  document.getElementById('loginWrap').style.display='block';
  document.getElementById('app').style.display='none';
  document.getElementById('loginPin').value='';

}

async function loadMyEmails() {

}

function renderEmails() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const allTabs = ['pendiente','gestion','gestionado','solucionado'];
  allTabs.forEach(t=>{
    const el=document.getElementById(`cnt-${t}`);
    if(el) el.textContent=state.emails.filter(e=>e.estado===t).length;
  });
  const filtered = state.emails.filter(e=>
    e.estado===state.currentTab &&
    (!search||(e.asunto||'').toLowerCase().includes(search)||(e.remitente||'').toLowerCase().includes(search)||(e.remitente_nombre||'').toLowerCase().includes(search))
  );
  const container = document.getElementById('emailsList');
  if(!filtered.length){container.innerHTML=`<div class="empty-state"><div class="ei">📭</div><p>Sin correos aquí</p></div>`;return;}
  const labels={pendiente:'Pendiente',gestion:'En Gestión',gestionado:'Gestionado',solucionado:'Solucionado'};
  container.innerHTML=filtered.map(email=>{
    const timeStr=formatDate(new Date(email.fecha));
    return `<div class="email-item ${email.id===state.selectedId?'selected':''} ${!email.leido?'unread':''}" onclick="selectEmail('${email.id}')">

          ${email.tiene_adjuntos?'<span>📎</span>':''}
          <span class="e-time">${timeStr}</span>
        </div>

// ─── ADJUNTOS ────────────────────────────────────────────────
async function buildAdjuntos(correoId, email) {
  let adjuntos=[];
  try { adjuntos=await sb(`adjuntos?correo_id=eq.${correoId}`)||[]; } catch {}
  // fallback campo adjuntos JSON
  if(!adjuntos.length && email._raw.adjuntos){
    try {
      const raw=typeof email._raw.adjuntos==='string'?JSON.parse(email._raw.adjuntos):email._raw.adjuntos;
      if(Array.isArray(raw)) adjuntos=raw.map(a=>({nombre:a.nombre||a.name,tipo_contenido:a.tipo||a.tipo_contenido||a.contentType||'',content_bytes:a.contenido_base64||a.content_bytes||null,tamaño_bytes:a.tamano||a.tamaño_bytes||0}));
    } catch {}
  }
  if(!adjuntos.length) return '';
  const images=adjuntos.filter(a=>(a.tipo_contenido||'').startsWith('image/')&&a.content_bytes);
  const pdfs=adjuntos.filter(a=>(a.tipo_contenido||'').includes('pdf')&&a.content_bytes);
  const others=adjuntos.filter(a=>!images.includes(a)&&!pdfs.includes(a));
  let html=`<div class="adj-section"><div class="adj-title">📎 Adjuntos (${adjuntos.length})</div>`;
  if(images.length){
    html+=`<div class="adj-grid">`;
    images.forEach(a=>{
      const src=`data:${a.tipo_contenido};base64,${a.content_bytes}`;
      html+=`<div class="adj-img-card" onclick="openAdjModal('img','${src}','${esc(a.nombre||'')}')">
        <img src="${src}" alt="${esc(a.nombre||'')}" loading="lazy">
        <div class="adj-img-label">${esc(a.nombre||'Imagen')}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  pdfs.forEach(a=>{
    const src=`data:application/pdf;base64,${a.content_bytes}`;
    const kb=Math.round((a.tamaño_bytes||0)/1024);
    html+=`<div class="adj-pdf-wrap">
      <div class="adj-pdf-header">
        <span class="adj-pdf-name">📄 ${esc(a.nombre||'Documento.pdf')} ${kb>0?`(${kb} KB)`:''}</span>
        <div style="display:flex;gap:6px">
          <button class="adj-pill" onclick="openAdjModal('pdf','${src}','${esc(a.nombre||'')}')">⛶ Ampliar</button>
          <a class="adj-pill" href="${src}" download="${a.nombre||'archivo.pdf'}">⬇</a>
        </div>
      </div>
      <iframe class="adj-pdf-frame" src="${src}" title="${esc(a.nombre||'')}"></iframe>
    </div>`;
  });
  if(others.length){
    html+=`<div class="adj-files">`;
    others.forEach(a=>{
      const icon=getFileIcon(a.nombre,a.tipo_contenido);
      const kb=Math.round((a.tamaño_bytes||0)/1024);
      if(a.content_bytes){
        html+=`<a class="adj-pill" href="data:${a.tipo_contenido||'application/octet-stream'};base64,${a.content_bytes}" download="${a.nombre||'archivo'}">${icon} ${esc(a.nombre||'Archivo')} <span style="font-size:10px;opacity:.6">${kb>0?kb+'KB':''}</span></a>`;
      } else {
        html+=`<span class="adj-pill" style="opacity:.5">${icon} ${esc(a.nombre||'Archivo')}</span>`;
      }
    });
    html+=`</div>`;
  }
  return html+`</div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────
async function changeStatus(id, status) {
  const email=state.emails.find(e=>e.id===id);
  const patch={estado:status};
  if(['solucionado','gestionado'].includes(status)) patch.fecha_resolucion=new Date().toISOString();
  await sb(`correos?id=eq.${id}`,'PATCH',patch);
  // Registrar en historial_eventos (compatible con n8n)
  try {
    await sb('historial_eventos','POST',{
      correo_id:id, message_id:email?.message_id,
      evento:`estado_${status}`,
      from_email:email?.remitente, subject:email?.asunto,
      received_at:email?.fecha,
      metadata:{de:email?.estado,a:status,agente_id:state.currentAgent?.id,agente_nombre:state.currentAgent?.nombre}
    });
  } catch {
    try{await sb('historial','POST',{correo_id:id,accion:status,detalle:`Agente: ${state.currentAgent?.nombre}`,fecha:new Date().toISOString()});}catch{}
  }
  showToast(`Marcado: ${status}`,'success');
  await loadMyEmails();
  selectEmail(id);
}

async function sendReply(id) {
  const email=state.emails.find(e=>e.id===id);
  if(!email) return;
  const body=document.getElementById('replyText')?.value?.trim();
  if(!body){showToast('Escribe un mensaje','info');return;}
  let exitoso=false,errMsg='';

  // Firma corporativa
  const firma = `
    <br><br>
    <div style="border-top:1px solid #dde1eb;margin-top:16px;padding-top:12px;font-family:Arial,sans-serif;font-size:12px;color:#64748b">
      <strong style="color:#0a0e1a;font-size:13px">${state.currentAgent?.nombre||''}</strong><br>
      Gestión PQR · Tododrogas S.A.S<br>
      pqrs.institucional@tododrogas.com.co
    </div>`;

  // Hilo del correo original (para que quede en el mismo hilo)
  const citado = `
    <br>
    <div style="border-left:3px solid #2563eb;padding-left:12px;margin-top:12px;color:#64748b;font-size:12px">
      <div style="margin-bottom:6px"><strong>De:</strong> ${email.remitente_nombre||email.remitente} &lt;${email.remitente}&gt;</div>
      <div style="margin-bottom:8px"><strong>Fecha:</strong> ${new Date(email.fecha).toLocaleString('es-CO',{dateStyle:'full',timeStyle:'short'})}</div>
      <div style="margin-bottom:8px"><strong>Asunto:</strong> ${email.asunto}</div>
      ${email.cuerpo_html||''}
    </div>`;

  const htmlBody = `<p style="font-family:Arial,sans-serif;font-size:14px;color:#0a0e1a;line-height:1.6">${body.replace(/\n/g,'<br>')}</p>${firma}${citado}`;

  // Determinar destinatario: si hay reply_to usar ese, si no usar from_email
  let replyToAddr = email.remitente;
  let replyToName = email.remitente_nombre||email.remitente;
  try {
    const rawReplyTo = email._raw?.reply_to||email._raw?.replyTo||[];
    const rt = Array.isArray(rawReplyTo) ? rawReplyTo : [];
    if(rt.length>0 && rt[0]?.emailAddress?.address) {
      replyToAddr = rt[0].emailAddress.address;
      replyToName = rt[0].emailAddress.name||replyToAddr;
    }
  } catch {}

  // Asunto con RE: sin duplicar
  const subject = email.asunto.startsWith('RE:') ? email.asunto : 'RE: '+email.asunto;

  // Mensaje con threading headers para que quede en el mismo hilo
  const mensaje = {
    subject,
    body: { contentType:'HTML', content: htmlBody },
    toRecipients: [{ emailAddress:{ address:replyToAddr, name:replyToName }}],
    // Threading: enlaza con el correo original
    ...(email.internet_message_id ? {
      singleValueExtendedProperties: [
        { id:'String {00020386-0000-0000-C000-000000000046} Name In-Reply-To', value: email.internet_message_id },
        { id:'String {00020386-0000-0000-C000-000000000046} Name References',  value: email.internet_message_id },
      ]
    } : {})
  };

  try {
    const token=await getGraphToken();
    const r=await fetch(`https://graph.microsoft.com/v1.0/users/${GRAPH_USER_ID}/sendMail`,{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({ message:mensaje, saveToSentItems:true })
    });
    if(r.ok||r.status===202){
      exitoso=true;
      showToast('Respuesta enviada ✓ — guardada en Enviados','success');
      if(document.getElementById('replyText'))document.getElementById('replyText').value='';
      toggleReply(id);
    } else throw new Error(await r.text());
  } catch(e){errMsg=e.message;showToast('Error: '+e.message.substring(0,80),'error');}
  try{await sb('respuestas','POST',{correo_id:id,agente_id:state.currentAgent?.id,cuerpo:body,enviado_en:new Date().toISOString(),exitoso,error_msg:errMsg});}catch{}
  try{await sb('historial_eventos','POST',{correo_id:id,message_id:email?.message_id,evento:'respuesta_enviada',from_email:email?.remitente,subject:email?.asunto,metadata:{exitoso,para:replyToAddr,agente_id:state.currentAgent?.id,agente_nombre:state.currentAgent?.nombre}});}catch{}
}

// ─── UTILS ───────────────────────────────────────────────────
function getFileIcon(n='',t=''){const e=(n.split('.').pop()||'').toLowerCase();if(e==='pdf')return '📄';if(['doc','docx'].includes(e))return '📝';if(['xls','xlsx','csv'].includes(e))return '📊';if(['ppt','pptx'].includes(e))return '📽';if(['zip','rar'].includes(e))return '🗜';if((t||'').startsWith('image/'))return '🖼';return '📎';}
function formatDate(d){const now=new Date(),diff=now-d;if(isNaN(diff))return '—';if(diff<60000)return 'ahora';if(diff<3600000)return Math.floor(diff/60000)+'m';if(diff<86400000)return Math.floor(diff/3600000)+'h';if(diff<604800000)return Math.floor(diff/86400000)+'d';return d.toLocaleDateString('es-CO');}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,type='info'){const tc=document.getElementById('toasts'),t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span>${msg}</span>`;tc.appendChild(t);setTimeout(()=>t.remove(),4000);}
</script>
